name: SSOT Enforcement

on:
  pull_request:
    branches:
      - main
      - feature/**

jobs:
  ssot-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for forbidden providers (strict)
        run: |
          echo "🔍 Strict scan (excluding node_modules, build, docs)..."

          # Get only relevant source files
          TARGETS=$(git ls-files \
            'apps/**/*.ts' \
            'shared/**/*.ts' \
            ':!*node_modules/**' \
            ':!*dist/**' \
            ':!*build/**' \
            ':!*.md' \
            ':!*package-lock.json' \
            ':!*yarn.lock')

          # Check for supabase in source code
          if echo "$TARGETS" | xargs grep -il "supabase" 2>/dev/null | grep -v "index.ts" > /dev/null; then
            echo "❌ Forbidden pattern detected in application code"
            echo "$TARGETS" | xargs grep -il "supabase" 2>/dev/null || true
            exit 1
          fi

      - name: Block forbidden env usage in code
        run: |
          echo "🔍 Checking for forbidden env variables in code..."

          # Check for DATABASE_URL or SUPABASE usage in code (case insensitive)
          if git ls-files \
            | xargs grep -Ei "process\.env\.(DATABASE_URL|SUPABASE)" 2>/dev/null; then
            echo "❌ Forbidden env usage detected in code"
            exit 1
          fi

      - name: Validate DB host is Neon-only
        run: |
          echo "🔍 Checking connection strings in production code..."

          # Production-code scope ONLY. Tests, docs and other CI workflows are
          # allowed to reference local/example DBs without tripping the gate.
          TARGETS=$(git ls-files 'apps/**/*.ts' 'shared/**/*.ts' \
            | grep -v -E '(node_modules|/tests/|/test/|\.test\.ts$|\.spec\.ts$|\.e2e\.ts$|/scripts/)')

          if [ -z "$TARGETS" ]; then
            echo "(no production source files matched, skipping)"
            exit 0
          fi

          FAIL=0

          # Find all postgres connection strings within the scoped target set.
          CONNS=$(echo "$TARGETS" | xargs grep -rohE "postgres(ql)?://[^\"' ]+" 2>/dev/null | sort -u)

          for url in $CONNS; do
            # Strip scheme, then take everything before the first '/' or '?',
            # then drop user:pass@ prefix if present, then drop :port suffix.
            #   postgres://u:p@h.neon.tech:5432/db?sslmode=require → h.neon.tech
            #   postgresql://h.neon.tech/db                        → h.neon.tech
            host=$(echo "$url" \
              | sed -E 's|^postgres(ql)?://||' \
              | sed -E 's|[/?].*$||' \
              | sed -E 's|^[^@]*@||' \
              | sed -E 's|:[0-9]+$||')
            # SSOT: ONLY neon.tech allowed - no exceptions
            if [[ -n "$host" && "$host" != *"neon.tech"* ]]; then
              echo "❌ Invalid DB host: $host (only Neon allowed)"
              FAIL=1
            fi
          done

          if [[ $FAIL -eq 1 ]]; then
            exit 1
          fi

      - name: Pass
        run: echo "✅ SSOT check passed - only Neon allowed"

      - name: Warn on unexpected DB host patterns
        run: |
          echo "🔎 Scanning for suspicious DB hosts..."
          
          CONNS=$(git ls-files | xargs grep -rohE "postgres(ql)?://[^\"' ]+" 2>/dev/null | sort -u)
          
          SUSPICIOUS=""
          
          for url in $CONNS; do
            if echo "$url" | grep -v "neon.tech" | grep -q "postgres"; then
              SUSPICIOUS="$SUSPICIOUS $url"
            fi
          done
          
          if [[ -n "$SUSPICIOUS" ]]; then
            echo "::warning::Potential non-Neon DB host detected: $SUSPICIOUS"
          fi
          
          echo "✅ DB host pattern scan complete"

      # NOTE: Previous step "Enforce ALLOWED_NEON_HOSTS for production" was
      # removed. It checked $ALLOWED_NEON_HOSTS in the CI environment, but
      # the variable was never wired from `secrets`, so it always failed.
      # More importantly, ALLOWED_NEON_HOSTS is a runtime allowlist consumed
      # by the API on Render — CI cannot meaningfully verify a Render-side
      # secret. The runtime guard in the API itself is the right place to
      # enforce this contract.