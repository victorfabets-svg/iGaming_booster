name: Runtime Validation

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.NEON_DB_URL }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find server entry
        id: find-server
        run: |
          SERVER_PATH=$(find apps/api/dist -name index.js | grep -i server | head -1)
          echo "Server path: $SERVER_PATH"
          echo "server_path=$SERVER_PATH" >> $GITHUB_OUTPUT

      - name: Install
        run: |
          cd apps/api
          npm install

      - name: Build
        run: |
          cd apps/api
          npm run build

      - name: Start server
        run: |
          node ${{ steps.find-server.outputs.server_path }} &
          sleep 8

      - name: Health check
        run: curl -f http://localhost:3000/health

      - name: Upload proof
        run: |
          echo "test file" > test.txt
          curl -X POST http://localhost:3000/proofs \
            -F "user_id=11111111-1111-1111-1111-111111111111" \
            -F "file=@test.txt"