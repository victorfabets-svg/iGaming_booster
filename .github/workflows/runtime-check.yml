name: Runtime Validation

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  NEON_DB_URL: postgres://ci:ci@localhost:5432/ci_test?sslmode=disable
  R2_ENDPOINT: http://localhost:9090
  R2_ACCESS_KEY_ID: ci-access
  R2_SECRET_ACCESS_KEY: ci-secret
  R2_BUCKET: ci-test
  R2_REGION: us-east-1
  PORT: 3000
  HOST: 0.0.0.0
  NODE_ENV: production
  JWT_SECRET: test-jwt-secret-ci
  CANARY_TOKEN: test-canary-token

jobs:

  runtime:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      s3mock:
        image: adobe/s3mock:latest
        env:
          initialBuckets: ci-test
        ports:
          - 9090:9090
        options: >-
          --health-cmd "wget -qO- http://localhost:9090 >/dev/null 2>&1 || curl -sf http://localhost:9090 >/dev/null 2>&1 || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check merge conflicts
        run: grep -rn "<<<<<<< HEAD" . --include="*.ts" --include="*.js" --include="*.json" 2>/dev/null | grep -v "node_modules" && echo "Conflict found" && exit 1 || echo "OK"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Validate ENV
        run: test -n "$NEON_DB_URL" || (echo "NEON_DB_URL missing" && exit 1)

      - name: Build API
        run: |
          cd apps/api
          npm run build

      - name: Build Worker
        run: |
          cd apps/worker
          npm run build

      - name: Verify worker dist exists
        run: |
          if [ ! -d apps/worker/dist ]; then
            echo "Worker dist NOT generated"
            ls -R apps/worker
            exit 1
          fi
          echo "Worker dist OK"

      - name: Verify artifacts (robust)
        run: |
          echo "Checking API artifact..."

          if [ -f apps/api/dist/server.js ]; then
            echo "API: flat bundle detected"
            API_ENTRY="apps/api/dist/server.js"
          elif [ -f apps/api/dist/apps/api/src/server/index.js ]; then
            echo "API: nested build detected"
            API_ENTRY="apps/api/dist/apps/api/src/server/index.js"
          else
            echo "API artifact NOT FOUND"
            ls -R apps/api/dist
            exit 1
          fi

          echo "Checking Worker artifact..."

          if [ -f apps/worker/dist/worker.js ]; then
            echo "Worker OK"
          else
            echo "Worker artifact NOT FOUND"
            ls -R apps/worker/dist
            exit 1
          fi

          echo "API_ENTRY=$API_ENTRY" >> $GITHUB_ENV

      - name: Apply migrations
        run: |
          set -euo pipefail
          # Wait for postgres service to accept connections (extra guard
          # beyond the service healthcheck).
          for i in $(seq 1 30); do
            if node -e "require('pg').Client && new (require('pg').Client)({connectionString: process.env.NEON_DB_URL}).connect().then(c=>c.end()).then(()=>process.exit(0)).catch(()=>process.exit(1))" 2>/dev/null; then
              echo "postgres ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Apply every .sql migration in order (filename sort).
          node -e "
            const fs = require('fs');
            const path = require('path');
            const { Client } = require('pg');
            (async () => {
              const dir = 'shared/database/migrations';
              const files = fs.readdirSync(dir).filter(f => f.endsWith('.sql')).sort();
              const c = new Client({ connectionString: process.env.NEON_DB_URL });
              await c.connect();
              for (const f of files) {
                const sql = fs.readFileSync(path.join(dir, f), 'utf8');
                console.log('applying', f);
                try {
                  await c.query(sql);
                } catch (e) {
                  console.error('FAIL in', f, ':', e.message);
                  process.exit(1);
                }
              }
              await c.end();
              console.log('migrations done');
            })().catch(e => { console.error(e); process.exit(1); });
          "

      - name: Create S3 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.R2_REGION }}
        run: |
          set -euo pipefail
          # Wait for s3mock to be responsive
          for i in $(seq 1 20); do
            if curl -sf -o /dev/null http://localhost:9090/ 2>/dev/null \
               || curl -sf -o /dev/null http://localhost:9090/favicon.ico 2>/dev/null; then
              echo "s3mock ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Create bucket (idempotent — ignore if already exists)
          aws --endpoint-url http://localhost:9090 \
              s3api create-bucket --bucket ci-test \
              || echo "create-bucket returned non-zero (may already exist)"
          # Verify by listing
          aws --endpoint-url http://localhost:9090 s3api list-buckets
          # Hard-assert ci-test is visible
          aws --endpoint-url http://localhost:9090 s3api list-buckets \
              | grep -q '"Name": "ci-test"' \
              || { echo "FAIL: ci-test bucket not found after create"; exit 1; }

      - name: Seed test user
        run: |
          set -euo pipefail
          node -e "
            const { Client } = require('pg');
            (async () => {
              const c = new Client({ connectionString: process.env.NEON_DB_URL });
              await c.connect();
              await c.query(\`
                INSERT INTO identity.users (id, email, phone, status)
                VALUES ('00000000-0000-4000-8000-000000000001',
                        'ci-e2e@example.com', NULL, 'active')
                ON CONFLICT (id) DO NOTHING
              \`);
              const r = await c.query(\"SELECT id FROM identity.users WHERE id='00000000-0000-4000-8000-000000000001'\");
              if (r.rows.length !== 1) { console.error('FAIL: seed user not present after insert'); process.exit(1); }
              await c.end();
              console.log('seed user OK: 00000000-0000-4000-8000-000000000001');
            })().catch(e => { console.error('seed error:', e.message); process.exit(1); });
          "

      - name: Start services
        run: |
          node $API_ENTRY > api.log 2>&1 &
          echo $! > api.pid
          node apps/worker/dist/worker.js > worker.log 2>&1 &
          echo $! > worker.pid

      - name: Wait API ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf --max-time 2 http://localhost:$PORT/health/db > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "=== api.log tail ==="
          tail -n 100 api.log 2>/dev/null || true
          echo "=== worker.log tail ==="
          tail -n 100 worker.log 2>/dev/null || true
          exit 1

      - name: Verify worker
        run: |
          test -n "$(cat worker.pid)" && ps -p $(cat worker.pid) > /dev/null && echo "Worker alive" || exit 1

      - name: E2E validation (multipart + event chain + DB state + idempotency)
        run: |
          set -euo pipefail


          echo "--- Step 1: generate JWT ---"
          TOKEN=$(node -e "
            const crypto = require('crypto');
            const b64 = s => Buffer.from(s).toString('base64url');
            const header = b64(JSON.stringify({alg:'HS256',typ:'JWT'}));
            const payload = b64(JSON.stringify({user_id:'00000000-0000-4000-8000-000000000001', iat: Math.floor(Date.now()/1000)}));
            const sig = crypto.createHmac('sha256', process.env.JWT_SECRET).update(header + '.' + payload).digest('base64url');
            console.log(header + '.' + payload + '.' + sig);
          ")
          [ -n "$TOKEN" ] || { echo "FAIL: empty JWT"; exit 1; }


          echo "--- Step 2: create test file ---"
          echo "e2e proof content $(date +%s)" > /tmp/proof.png


          echo "--- Step 3: first POST /proofs ---"
          HTTP1=$(curl -sS -o /tmp/resp1.json -w "%{http_code}" --max-time 15 -X POST http://localhost:$PORT/proofs \
            -H "Authorization: Bearer $TOKEN" \
            -H "Idempotency-Key: e2e-key-001" \
            -F "file=@/tmp/proof.png" || true)
          RESP1=$(cat /tmp/resp1.json 2>/dev/null || echo "")
          echo "resp1 (HTTP $HTTP1): $RESP1"
          if [ "$HTTP1" != "200" ] && [ "$HTTP1" != "201" ]; then
            echo "FAIL: POST /proofs returned HTTP $HTTP1"
            echo "=== api.log tail (last 200) ==="
            tail -n 200 api.log 2>/dev/null || echo "(no api.log)"
            echo "=== worker.log tail (last 200) ==="
            tail -n 200 worker.log 2>/dev/null || echo "(no worker.log)"
            exit 1
          fi
          PROOF_ID=$(echo "$RESP1" | node -e "try { console.log(JSON.parse(require('fs').readFileSync(0,'utf8')).proof_id || '') } catch(e) { console.log('') }")
          [ -n "$PROOF_ID" ] || { echo "FAIL: no proof_id in first response body"; exit 1; }
          echo "proof_id=$PROOF_ID"


          echo "--- Step 4: poll status (up to 45s) ---"
          FINAL_STATUS="pending"
          for i in $(seq 1 45); do
            RAW=$(curl -sf --max-time 5 "http://localhost:$PORT/proofs/$PROOF_ID" || echo "")
            STATUS=$(echo "$RAW" | node -e "try { console.log(JSON.parse(require('fs').readFileSync(0,'utf8')).status || '') } catch(e) { console.log('') }")
            echo "poll $i: status='$STATUS'"
            case "$STATUS" in
              approved|rejected|manual_review) FINAL_STATUS=$STATUS; break ;;
            esac
            sleep 1
          done
          echo "final status: $FINAL_STATUS"


          echo "--- Step 5: DB state assertion ---"
          node -e "
            const { Client } = require('pg');
            (async () => {
              const c = new Client({ connectionString: process.env.NEON_DB_URL });
              await c.connect();
              const proofs    = Number((await c.query('SELECT COUNT(*) FROM validation.proofs')).rows[0].count);
              const eventRows = (await c.query('SELECT DISTINCT event_type FROM events.events ORDER BY event_type')).rows.map(r => r.event_type);
              const processed = Number((await c.query('SELECT COUNT(*) FROM events.processed_events')).rows[0].count);
              console.log('proofs count:', proofs);
              console.log('event types:', JSON.stringify(eventRows));
              console.log('processed_events count:', processed);


              if (proofs < 1) {
                console.error('FAIL: expected >= 1 proof in validation.proofs, got', proofs);
                process.exit(1);
              }
              const required = [
                'proof_submitted',
                'fraud_check_requested',
                'payment_identifier_requested'
              ];
              const missing = required.filter(e => !eventRows.includes(e));
              if (missing.length > 0) {
                console.error('FAIL: required events missing:', missing);
                process.exit(1);
              }
              // Soft check: if final status was approved, the full chain
              // including fraud_scored/payment_identifier_extracted/proof_validated
              // should exist. If rejected/manual_review, those downstream events
              // may not fire. Log but do not fail.
              const downstream = [
                'fraud_scored',
                'payment_identifier_extracted',
                'proof_validated',
                'reward_granted',
                'numbers_generated'
              ];
              const downstreamPresent = downstream.filter(e => eventRows.includes(e));
              console.log('downstream events present:', downstreamPresent);


              await c.end();
              console.log('DB state assertion: OK');
            })().catch(e => { console.error('DB assertion error:', e.message); process.exit(1); });
          "


          echo "--- Step 6: idempotency test ---"
          HTTP2=$(curl -sS -o /tmp/resp2.json -w "%{http_code}" --max-time 15 -X POST http://localhost:$PORT/proofs \
            -H "Authorization: Bearer $TOKEN" \
            -H "Idempotency-Key: e2e-key-001" \
            -F "file=@/tmp/proof.png" || true)
          RESP2=$(cat /tmp/resp2.json 2>/dev/null || echo "")
          echo "resp2 (HTTP $HTTP2): $RESP2"
          if [ "$HTTP2" != "200" ] && [ "$HTTP2" != "201" ]; then
            echo "FAIL: idempotency POST returned HTTP $HTTP2"
            exit 1
          fi
          PROOF_ID2=$(echo "$RESP2" | node -e "try { console.log(JSON.parse(require('fs').readFileSync(0,'utf8')).proof_id || '') } catch(e) { console.log('') }")
          if [ "$PROOF_ID" != "$PROOF_ID2" ]; then
            echo "FAIL: idempotency broken. First=$PROOF_ID Second=$PROOF_ID2"
            exit 1
          fi
          echo "idempotency: OK (same proof_id returned)"


          echo "✅ E2E passed: multipart + 3+ pipeline events + DB state + idempotency" 

      - name: Cleanup
        if: always()
        run: |
          echo "=== api.log tail (last 200 lines) ==="
          tail -n 200 api.log 2>/dev/null || echo "(no api.log)"
          echo "=== worker.log tail (last 200 lines) ==="
          tail -n 200 worker.log 2>/dev/null || echo "(no worker.log)"
          kill $(cat api.pid) 2>/dev/null || true
          kill $(cat worker.pid) 2>/dev/null || true
