name: Runtime Validation

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  db-connection-check:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Test database connection
        working-directory: apps/api
        env:
          NEON_DB_URL: postgresql://test:test@postgres:5432/test
        run: |
          for i in {1..10}; do
            node -e "
            const { Client } = require('pg');
            const client = new Client({ connectionString: process.env.NEON_DB_URL });
            client.connect()
              .then(() => { console.log('DB Connected'); return client.query('SELECT 1'); })
              .then(() => { console.log('Query OK'); client.end(); process.exit(0); })
              .catch(e => { console.error('Error:', e.message); process.exit(1); });
            " && break
            echo "Attempt $i failed, retrying..."
            sleep 2
          done || (echo "All retries failed" && exit 1)

  db-write-test:
    needs: db-connection-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Run write test
        working-directory: apps/api
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: node scripts/db-write-test.js

  runtime-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Debug build output
        working-directory: apps/api
        run: |
          echo "=== DIST STRUCTURE ==="
          ls -R dist || echo "No dist folder"
          echo "=== DIST FILES ==="
          find dist -type f | sort
          echo "=== SERVER FILES ==="
          ls -la dist/apps/api/src/server/ || true

      - name: Build Worker (safe)
        run: |
          if [ -f "apps/worker/package.json" ]; then
            echo "Worker found — building"
            cd apps/worker
            npm install
            npm run build
          else
            echo "⚠️ Worker not present — skipping"
          fi

      - name: Start server
        env:
          NODE_ENV: development
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          JWT_SECRET: test-secret-for-ci
          CANARY_TOKEN: test-canary-token
          PORT: 3000
        working-directory: apps/api
        run: |
          PORT=$PORT node dist/apps/api/src/server/app.js > api.log 2>&1 &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          echo "Started API with PID $API_PID on port $PORT (logs: $(pwd)/api.log)"
          sleep 2
          echo "=== SERVER LOG ==="
          cat api.log || true

      - name: Debug port
        run: |
          echo "Using PORT=$PORT"

      - name: Check port binding
        run: |
          echo "=== PORT CHECK ==="
          lsof -i :$PORT || true

      - name: Test raw curl
        run: |
          curl -v http://localhost:$PORT/health/db || true

      - name: Wait for API to be ready
        run: |
          echo "Starting readiness check..."

          for i in {1..30}; do
            RESPONSE=$(curl -s --fail http://localhost:$PORT/health/db 2>/dev/null || echo "")

            if [[ -z "$RESPONSE" ]]; then
              echo "Attempt $i: Empty response, waiting..."
              sleep 1
              continue
            fi

            STATUS=$(echo "$RESPONSE" | jq -r '.status // "invalid"' 2>/dev/null || echo "invalid")

            echo "Attempt $i: Status = $STATUS"

            if [[ "$STATUS" == "ok" || "$STATUS" == "degraded" ]]; then
              echo "API liveness confirmed (status: $STATUS)"
              exit 0
            fi

            sleep 1
          done

          echo "System never became ready"
          echo "Final response: $RESPONSE"
          exit 1

      - name: Validate DB readiness (strict)
        run: |
          RESPONSE=$(curl -s http://localhost:$PORT/health/db)
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "invalid"')

          if [[ "$STATUS" != "ok" ]]; then
            echo "DB not ready after boot"
            echo "$RESPONSE"
            exit 1
          fi
          echo "DB ready (status: ok)"

      - name: Start Worker (optional)
        run: |
          if [ -f "apps/worker/package.json" ]; then
            echo "Worker found — starting"
            cd apps/worker
            node dist/index.js &
            WORKER_PID=$!
            echo "WORKER_PID=$WORKER_PID" >> $GITHUB_ENV
            echo "Worker started with PID $WORKER_PID"
          else
            echo "⚠️ Worker not present — skipping"
          fi

      - name: Run E2E tests
        working-directory: apps/api
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          npm run test:e2e || { echo "E2E failed"; exit 1; }
          echo "E2E tests passed"

      - name: Debug snapshot on failure
        if: failure()
        run: |
          echo "===== API LOG ====="
          cat apps/api/api.log 2>/dev/null || echo "No log file"

          echo ""
          echo "===== RUNNING PROCESSES ====="
          ps aux | grep -E "node|api" | grep -v grep || true

          echo ""
          echo "===== PORT BINDINGS ====="
          ss -tuln 2>/dev/null || netstat -tuln 2>/dev/null || echo "ss/netstat not available"

          echo ""
          echo "===== LAST HEALTH CHECK ====="
          curl -sv http://localhost:$PORT/health/db 2>&1 || echo "Health endpoint unreachable"

      - name: Cleanup processes
        if: always()
        run: |
          if [ -n "${{ env.API_PID }}" ]; then
            kill ${{ env.API_PID }} 2>/dev/null || true
            echo "Killed API"
          fi
          if [ -n "${{ env.WORKER_PID }}" ]; then
            kill ${{ env.WORKER_PID }} 2>/dev/null || true
            echo "Killed Worker"
          fi

  pipeline-e2e-test:
    runs-on: ubuntu-latest
    needs: runtime-check

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Debug build output
        working-directory: apps/api
        run: |
          echo "=== DIST STRUCTURE ==="
          ls -R dist || echo "No dist folder"
          echo "=== DIST FILES ==="
          find dist -type f | sort
          echo "=== SERVER FILES ==="
          ls -la dist/apps/api/src/server/ || true

      - name: Start API
        env:
          PORT: 3000
        working-directory: apps/api
        run: |
          PORT=$PORT node dist/apps/api/src/server/app.js > api.log 2>&1 &
          echo $! > api.pid
          sleep 2
          echo "=== SERVER LOG ==="
          cat api.log || true

      - name: Debug port
        run: |
          echo "Using PORT=$PORT"

      - name: Check port binding
        run: |
          echo "=== PORT CHECK ==="
          lsof -i :$PORT || true

      - name: Test raw curl
        run: |
          curl -v http://localhost:$PORT/health/db || true

      - name: Wait for API
        run: |
          for i in {1..30}; do
            RESPONSE=$(curl -s http://localhost:$PORT/health/db || echo "")
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "invalid"')

            if [[ "$STATUS" == "ok" || "$STATUS" == "degraded" ]]; then
              echo "API liveness confirmed (status: $STATUS)"
              exit 0
            fi

            sleep 1
          done

          echo "API FAILED"
          exit 1

      - name: Validate DB readiness (strict)
        run: |
          RESPONSE=$(curl -s http://localhost:$PORT/health/db)
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "invalid"')

          if [[ "$STATUS" != "ok" ]]; then
            echo "DB not ready after boot"
            echo "$RESPONSE"
            exit 1
          fi
          echo "DB ready (status: ok)"

      - name: Run E2E
        run: |
          echo "E2E running..."

      - name: Debug logs
        if: failure()
        run: |
          echo "===== API LOG ====="
          cat apps/api/api.log 2>/dev/null || echo "No log file"

      - name: Cleanup
        if: always()
        run: |
          kill $(cat api.pid) || true