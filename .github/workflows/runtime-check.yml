name: Runtime Validation

on:
  workflow_dispatch: {}

jobs:
  runtime-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Debug build output
        run: |
          echo "=== ROOT ==="
          ls -la

          echo "=== DIST ==="
          ls -la apps/api/dist || true

          echo "=== FULL TREE ==="
          find apps/api/dist -type f || true

      - name: Start server (safe)
        env:
          DATABASE_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          FILE=$(find apps/api/dist -name index.js | grep server/index.js | head -n 1)

          echo "Found entry: $FILE"

          if [ -z "$FILE" ]; then
            echo "Server entry not found"
            exit 1
          fi

          node $FILE &

          sleep 5

      - name: Health check
        run: curl -s http://localhost:3000/health

      - name: Test proof upload
        run: |
          echo "test" > test.txt
          curl -X POST http://localhost:3000/proofs \
            -F "file=@test.txt" \
            -F "user_id=test-user"
