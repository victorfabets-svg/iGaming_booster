name: Runtime Validation

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  db-connection-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pg client
        run: npm install pg

      - name: Validate Neon DB Connection
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          node -e "
          const { Client } = require('pg');

          const url = process.env.NEON_DB_URL;
          if (!url) {
            throw new Error('NEON_DB_URL not set');
          }

          const host = new URL(url).hostname;
          if (!host.endsWith('neon.tech')) {
            throw new Error('Invalid DB provider: ' + host);
          }

          const client = new Client({ connectionString: url, ssl: true });

          client.connect()
            .then(() => client.query('SELECT NOW()'))
            .then(res => {
              console.log('CONNECTED TO NEON:', res.rows[0]);
              return client.end();
            })
            .catch(err => {
              console.error('DB CONNECTION FAILED:', err);
              process.exit(1);
            });
          "

  runtime-check:
    needs: db-connection-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          cd apps/api
          npm install

      - name: Build
        run: |
          cd apps/api
          npm run build

      - name: Debug build output
        run: |
          echo "=== ROOT ==="
          ls -la

          echo "=== DIST ==="
          ls -la apps/api/dist || true

          echo "=== FULL TREE ==="
          find apps/api/dist -type f || true

      - name: Start server (debug mode)
        working-directory: apps/api
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "=== STARTING SERVER ==="
          node dist/server/index.js &

      - name: Wait for server
        run: sleep 5

      - name: Health check
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:3000/health; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting for server..."
            sleep 2
          done

          echo "Server failed to start"
          exit 1

      - name: Start worker (background)
        run: |
          node apps/worker/dist/index.js > worker.log 2>&1 &

      - name: Validate worker started
        run: |
          sleep 5
          if ! grep -Ei "worker|consumer|started" worker.log; then
            echo "Worker failed"
            cat worker.log
            exit 1
          fi

  schema-audit:
    needs: db-connection-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup temp node environment
        run: |
          mkdir -p tmp-audit
          cd tmp-audit
          npm init -y
          npm install pg

      - name: Run schema audit
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          cd tmp-audit
          node ../scripts/schema-audit.js
