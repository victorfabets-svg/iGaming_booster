name: Runtime Validation

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  runtime-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install API dependencies
        run: |
          cd apps/api
          npm install

      - name: Install Worker dependencies
        run: |
          cd apps/worker
          npm install

      - name: Build API
        run: |
          cd apps/api
          npm run build

      - name: Build Worker
        run: |
          cd apps/worker
          npm run build

      - name: Start API with verification
        env:
          NODE_ENV: development
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          JWT_SECRET: test-secret-for-ci
          CANARY_TOKEN: test-canary-token
        run: |
          echo "=== Starting API ==="
          cd apps/api
          npm run start > $PWD/api.log 2>&1 &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          echo "API started with PID: $API_PID"

          echo "=== Waiting for API startup ==="
          sleep 5

          echo "=== Verifying API responds ==="
          curl -f http://localhost:3000 || exit 1
          echo "API verification PASSED"

      - name: Start Worker with verification
        run: |
          echo "=== Starting Worker ==="
          cd apps/worker
          npm run start > $PWD/worker.log 2>&1 &
          WORKER_PID=$!
          echo "WORKER_PID=$WORKER_PID" >> $GITHUB_ENV
          echo "Worker started with PID: $WORKER_PID"

          echo "=== Waiting for Worker startup ==="
          sleep 5

          echo "=== Verifying Worker is alive ==="
          ps aux | grep -v grep | grep worker || exit 1
          echo "Worker verification PASSED"

      - name: Run E2E tests (MANDATORY)
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "=== Running E2E tests ==="
          npm run test:e2e
          echo "E2E tests PASSED"

      - name: Debug logs on failure
        if: failure()
        run: |
          echo "===== API LOG ====="
          cat apps/api/api.log 2>/dev/null || echo "No API log file"

          echo ""
          echo "===== WORKER LOG ====="
          cat apps/worker/worker.log 2>/dev/null || echo "No Worker log file"

          echo ""
          echo "===== RUNNING PROCESSES ====="
          ps aux | grep -E "node|worker" | grep -v grep || echo "No processes found"

          echo ""
          echo "===== PORT BINDINGS ====="
          ss -tuln 2>/dev/null || netstat -tuln 2>/dev/null || echo "ss/netstat not available"

          echo ""
          echo "===== LAST API CHECK ====="
          curl -sv http://localhost:3000 2>&1 || echo "API unreachable"

      - name: Cleanup processes
        if: always()
        run: |
          if [ -n "${{ env.API_PID }}" ]; then
            kill ${{ env.API_PID }} 2>/dev/null || true
            echo "Cleaned up API (PID: ${{ env.API_PID }})"
          fi
          if [ -n "${{ env.WORKER_PID }}" ]; then
            kill ${{ env.WORKER_PID }} 2>/dev/null || true
            echo "Cleaned up Worker (PID: ${{ env.WORKER_PID }})"
          fi
