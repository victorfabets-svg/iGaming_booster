name: Runtime Validation

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  db-connection-check:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Test database connection
        working-directory: apps/api
        env:
          NEON_DB_URL: postgresql://test:test@postgres:5432/test
        run: |
          for i in {1..10}; do
            node -e "
            const { Client } = require('pg');
            const client = new Client({ connectionString: process.env.NEON_DB_URL });
            client.connect()
              .then(() => { console.log('DB Connected'); return client.query('SELECT 1'); })
              .then(() => { console.log('Query OK'); client.end(); process.exit(0); })
              .catch(e => { console.error('Error:', e.message); process.exit(1); });
            " && break
            echo "Attempt $i failed, retrying..."
            sleep 2
          done || (echo "All retries failed" && exit 1)

  db-write-test:
    needs: db-connection-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Run write test
        working-directory: apps/api
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: node scripts/db-write-test.js

  runtime-check:
    needs: db-write-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Runtime check (DB only)
        working-directory: apps/api
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: node scripts/runtime-check.js

  pipeline-e2e-test:
    runs-on: ubuntu-latest
    needs: runtime-check

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Debug build output
        working-directory: apps/api
        run: |
          echo "=== DIST STRUCTURE ==="
          ls -R dist || echo "No dist folder"
          echo "=== DIST FILES ==="
          find dist -type f | sort
          echo "=== SERVER FILES ==="
          ls -la dist/apps/api/src/server/ || true

      - name: Start API
        env:
          PORT: 3000
        working-directory: apps/api
        run: |
          PORT=$PORT HOST=0.0.0.0 node dist/apps/api/src/server/app.js > api.log 2>&1 &
          echo $! > api.pid
          sleep 2
          echo "=== SERVER LOG ==="
          cat api.log || true

      - name: Debug port
        run: |
          echo "Using PORT=$PORT"

      - name: Check port binding
        run: |
          echo "=== PORT CHECK ==="
          lsof -i :$PORT || true

      - name: Test raw curl
        run: |
          curl -v http://localhost:$PORT/health/db || true

      - name: Wait for API
        run: |
          for i in {1..30}; do
            RESPONSE=$(curl -s http://localhost:$PORT/health/db || echo "")
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "invalid"')

            if [[ "$STATUS" == "ok" || "$STATUS" == "degraded" ]]; then
              echo "API liveness confirmed (status: $STATUS)"
              exit 0
            fi

            sleep 1
          done

          echo "API FAILED"
          exit 1

      - name: Validate DB readiness (strict)
        run: |
          RESPONSE=$(curl -s http://localhost:$PORT/health/db)
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "invalid"')

          if [[ "$STATUS" != "ok" ]]; then
            echo "DB not ready after boot"
            echo "$RESPONSE"
            exit 1
          fi
          echo "DB ready (status: ok)"

      - name: Run E2E
        run: |
          echo "E2E running..."

      - name: Debug logs
        if: failure()
        run: |
          echo "===== API LOG ====="
          cat apps/api/api.log 2>/dev/null || echo "No log file"

      - name: Cleanup
        if: always()
        run: |
          kill $(cat api.pid) || true