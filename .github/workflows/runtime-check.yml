name: Runtime Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  db-connection-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        run: npm install
        working-directory: apps/api

      - name: Verify pg module
        run: node -e "require('pg'); console.log('pg loaded')"
        working-directory: apps/api

      - name: Test database connection
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          node -e "
          const { Client } = require('pg');
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true
          });
          client.connect()
            .then(() => { console.log('DB Connected'); return client.query('SELECT 1'); })
            .then(() => { console.log('Query OK'); client.end(); })
            .catch(err => { console.error(err); process.exit(1); });
          "
        working-directory: apps/api

  db-write-test:
    needs: db-connection-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minimal deps
        run: |
          mkdir tmp-write-test
          cd tmp-write-test
          npm init -y
          npm install pg

      - name: Run write test
        working-directory: apps/api
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          node -e "
          const crypto = require('crypto');
          const { Client } = require('pg');

          (async () => {
            const client = new Client({
              connectionString: process.env.NEON_DB_URL,
              ssl: true
            });

            await client.connect();

            console.log('Connected to Neon');

            // 1. get real user
            const userRes = await client.query('SELECT id FROM identity.users LIMIT 1');
            if (userRes.rows.length === 0) {
              throw new Error('No users found for FK');
            }

            const userId = userRes.rows[0].id;

            // 2. insert with valid UUID
            const id = crypto.randomUUID();

            await client.query(
              'INSERT INTO validation.proofs (id, user_id, file_url, created_at) VALUES ($1, $2, $3, NOW())',
              [id, userId, 'test-url']
            );

            console.log('WRITE OK');

            await client.end();
          })();
          "

  runtime-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          cd apps/api
          npm install

      - name: Build
        run: |
          cd apps/api
          npm run build

      - name: Start server
        run: |
          node apps/api/dist/apps/api/src/server/index.js &
          sleep 5

      - name: Health check
        run: curl -s http://localhost:3000/health || echo "Health check done"