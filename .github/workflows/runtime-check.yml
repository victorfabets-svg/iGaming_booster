name: Runtime Validation

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
  PORT: 3000
  HOST: 0.0.0.0
  NODE_ENV: production
  JWT_SECRET: test-jwt-secret-ci
  CANARY_TOKEN: test-canary-token

jobs:

  runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check merge conflicts
        run: grep -rn "<<<<<<< HEAD" . --include="*.ts" --include="*.js" --include="*.json" 2>/dev/null | grep -v "node_modules" && echo "Conflict found" && exit 1 || echo "OK"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate ENV
        run: test -n "$NEON_DB_URL" || (echo "NEON_DB_URL missing" && exit 1)

      - name: Build API
        run: |
          cd apps/api
          npm run build

      - name: Build Worker
        run: |
          cd apps/worker
          npm run build

      - name: Verify worker dist exists
        run: |
          if [ ! -d apps/worker/dist ]; then
            echo "Worker dist NOT generated"
            ls -R apps/worker || true
            exit 1
          fi
          echo "Worker dist OK"

      - name: Verify artifacts (robust)
        run: |
          echo "Checking API artifact..."

          if [ -f apps/api/dist/server.js ]; then
            echo "API: flat bundle detected"
            API_ENTRY="apps/api/dist/server.js"
          elif [ -f apps/api/dist/apps/api/src/server/index.js ]; then
            echo "API: nested build detected"
            API_ENTRY="apps/api/dist/apps/api/src/server/index.js"
          else
            echo "API artifact NOT FOUND"
            ls -R apps/api/dist || true
            exit 1
          fi

          echo "Checking Worker artifact..."

          if [ -f apps/worker/dist/worker.js ]; then
            echo "Worker OK"
          else
            echo "Worker artifact NOT FOUND"
            ls -R apps/worker/dist || true
            exit 1
          fi

          echo "API_ENTRY=$API_ENTRY" >> $GITHUB_ENV

      - name: Start services
        run: |
          node $API_ENTRY > api.log 2>&1 &
          echo $! > api.pid
          node apps/worker/dist/worker.js > worker.log 2>&1 &
          echo $! > worker.pid

      - name: Wait API ready
        run: |
          for i in {1..6}; do
            if curl -sf --max-time 2 http://localhost:$PORT/health/db > /dev/null 2>&1; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          cat api.log 2>/dev/null || true
          exit 1

      - name: Verify worker
        run: |
          test -n "$(cat worker.pid)" && ps -p $(cat worker.pid) > /dev/null && echo "Worker alive" || exit 1

      - name: E2E validation
        run: |
          curl -sf --max-time 2 -X POST http://localhost:$PORT/proofs \
            -H "Content-Type: application/json" \
            -d '{"user_id":"ci-test-user","file_url":"https://example.com/test.jpg"}' || true
          sleep 1
          curl -sf --max-time 2 http://localhost:$PORT/events | head -20 || true

      - name: Cleanup
        if: always()
        run: |
          kill $(cat api.pid) 2>/dev/null || true
          kill $(cat worker.pid) 2>/dev/null || true
