name: Runtime Validation

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
  PORT: 3000
  HOST: 0.0.0.0
  NODE_ENV: production
  JWT_SECRET: test-jwt-secret-ci
  CANARY_TOKEN: test-canary-token

jobs:

  runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check merge conflicts
        run: |
          echo "Checking for merge conflict markers..."
          if grep -rn "<<<<<<< HEAD" . --include="*.ts" --include="*.js" --include="*.json" 2>/dev/null | grep -v "node_modules"; then
            echo "❌ Merge conflict markers found"
            exit 1
          fi
          echo "✅ No merge conflict markers found"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate ENV
        run: |
          echo "Validating NEON_DB_URL..."
          test -n "$NEON_DB_URL" || (echo "NEON_DB_URL missing" && exit 1)

      - name: Build API & Worker
        run: |
          (cd apps/api && npm run build) &
          (cd apps/worker && npm run build) &
          wait

      - name: Verify artifacts
        run: |
          test -f apps/api/dist/apps/api/src/server/index.js || exit 1
          test -f apps/worker/dist/worker.js || exit 1

      - name: Start services
        run: |
          node apps/api/dist/apps/api/src/server/index.js > api.log 2>&1 &
          echo $! > api.pid
          node apps/worker/dist/worker.js > worker.log 2>&1 &
          echo $! > worker.pid

      - name: Wait API ready
        run: |
          for i in {1..6}; do
            if curl -sf --max-time 2 http://localhost:$PORT/health/db > /dev/null 2>&1; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          cat api.log 2>/dev/null || true
          exit 1

      - name: Verify worker
        run: |
          test -n "$(cat worker.pid)" && ps -p $(cat worker.pid) > /dev/null && echo "Worker alive" || exit 1

      - name: E2E validation
        run: |
          curl -sf --max-time 2 -X POST http://localhost:$PORT/proofs \
            -H "Content-Type: application/json" \
            -d '{"user_id":"ci-test-user","file_url":"https://example.com/test.jpg"}' || true
          sleep 1
          curl -sf --max-time 2 http://localhost:$PORT/events | head -20 || true

      - name: Cleanup
        if: always()
        run: |
          kill $(cat api.pid) 2>/dev/null || true
          kill $(cat worker.pid) 2>/dev/null || true
