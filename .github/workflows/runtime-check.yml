name: Runtime Validation

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# GLOBAL ENV CONTRACT — SSOT
env:
  NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
  PORT: 3000
  HOST: 0.0.0.0

jobs:
  db-connection-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        working-directory: apps/api
        run: |
          npm install
          npm install jsonwebtoken

      - name: Test database connection
        working-directory: apps/api
        run: |
          for i in {1..10}; do
            node -e "
            const { Client } = require('pg');
            const client = new Client({ connectionString: process.env.NEON_DB_URL, ssl: { rejectUnauthorized: false } });
            client.connect()
              .then(() => { console.log('DB Connected'); return client.query('SELECT 1'); })
              .then(() => { console.log('Query OK'); client.end(); process.exit(0); })
              .catch(e => { console.error('Error:', e.message); process.exit(1); });
            " && break
            echo "Attempt $i failed, retrying..."
            sleep 2
          done || (echo "All retries failed" && exit 1)

  db-write-test:
    needs: []
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Run write test
        working-directory: apps/api
        run: node scripts/db-write-test.js

  runtime-check:
    needs: [db-connection-check, db-write-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate ENV contract
        run: |
          test -n "$NEON_DB_URL" || (echo "NEON_DB_URL missing" && exit 1)
          test -n "$PORT" || (echo "PORT missing" && exit 1)
          echo "ENV CONTRACT OK"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Runtime check (DB only)
        working-directory: apps/api
        run: node scripts/runtime-check.js

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: apps/api/dist/server.js

  pipeline-e2e-test:
    runs-on: ubuntu-latest
    needs: runtime-check

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: api-build
          path: apps/api/dist

      - name: Verify artifact integrity
        run: |
          test -f apps/api/dist/server.js || (echo "Artifact missing: server.js" && exit 1)
          echo "ARTIFACT OK: $(ls -lh apps/api/dist/server.js)"

      - name: Start API
        working-directory: apps/api
        run: |
          node dist/server.js > api.log 2>&1 &
          echo $! > api.pid
          sleep 2
          echo "=== SERVER LOG ==="
          cat api.log || true

      - name: Debug port
        run: |
          echo "Using PORT=$PORT"

      - name: Check port binding
        run: |
          echo "=== PORT CHECK ==="
          lsof -i :$PORT || true

      - name: Test raw curl
        run: |
          curl -v http://localhost:$PORT/health/db || true

      - name: Wait for API
        run: |
          curl -f --retry 5 --retry-delay 1 http://localhost:$PORT/health/db || (echo "API health check failed" && exit 1)
          echo "API HEALTH OK"

      - name: Validate DB readiness (strict)
        run: |
          RESPONSE=$(curl -s http://localhost:$PORT/health/db)
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "invalid"')

          if [[ "$STATUS" != "ok" ]]; then
            echo "DB not ready after boot"
            echo "$RESPONSE"
            exit 1
          fi
          echo "DB ready (status: ok)"

      - name: Run E2E
        run: |
          # STEP 1: RESET DB - Drop all tables and run migrations
          echo "=== STEP 1: RESET DB ==="
          cd apps/api
          
          # Drop all schemas (clean slate)
          cd /home/runner/work/iGaming_booster/iGaming_booster/apps/api
          npm install jsonwebtoken
          
          node -e "
          const { Client } = require('pg');
          (async () => {
            const client = new Client({ 
              connectionString: process.env.NEON_DB_URL,
              ssl: { rejectUnauthorized: false }
            });
            await client.connect();
            
            // Drop all tables and schemas
            await client.query(\`DROP SCHEMA IF EXISTS public CASCADE\`);
            await client.query(\`CREATE SCHEMA public\`);
            
            console.log('DB RESET: All tables dropped');
            await client.end();
          })();
          " || true
          
          # Run migrations (skip reset since DB is fresh in CI)
          cd /home/runner/work/iGaming_booster/iGaming_booster/apps/api
          node -e "
          const { Client } = require('pg');
          const fs = require('fs');
          const path = require('path');
          
          (async () => {
            const client = new Client({ 
              connectionString: process.env.NEON_DB_URL,
              ssl: { rejectUnauthorized: false }
            });
            await client.connect();
            
            // Create schemas
            await client.query('CREATE SCHEMA IF NOT EXISTS events');
            await client.query('CREATE SCHEMA IF NOT EXISTS validation');
            await client.query('CREATE SCHEMA IF NOT EXISTS rewards');
            await client.query('CREATE SCHEMA IF NOT EXISTS identity');
            await client.query('CREATE SCHEMA IF NOT EXISTS fraud');
            
            console.log('Schemas created');
            
            // Insert test user for E2E
            await client.query(\`INSERT INTO identity.users (id, email, created_at) VALUES ('00000000-0000-0000-0000-000000000001', 'test@example.com', NOW()) ON CONFLICT DO NOTHING\`);
            console.log('Test user seeded');
            
            // Read and execute migration SQL from project root
            const migrationsDir = '/home/runner/work/iGaming_booster/iGaming_booster/shared/database/migrations';
            if (fs.existsSync(migrationsDir)) {
              const files = fs.readdirSync(migrationsDir).filter(f => f.endsWith('.sql')).sort();
              for (const file of files) {
                const sql = fs.readFileSync(path.join(migrationsDir, file), 'utf8');
                await client.query(sql).catch(e => { console.log('Skipped:', file); });
              }
              console.log('Migrations run:', files.length);
            }
            
            await client.end();
          })();
          "
          echo "=== MIGRATIONS COMPLETE ==="
          
          # STEP 2: START API
          echo "=== STEP 2: START API ==="
          cd /home/runner/work/iGaming_booster/iGaming_booster/apps/api
          node dist/server.js > api.log 2>&1 &
          API_PID=$!
          echo $API_PID > api.pid
          sleep 5
          
          # Check API is running
          curl -f http://localhost:3000/health/db || exit 1
          echo "=== API STARTED ==="
          
          # STEP 2b: START WORKER (Consumer)
          echo "=== STEP 2b: START WORKER ==="
          cd /home/runner/work/iGaming_booster/iGaming_booster/apps/api
          # Start all event consumers as background process
          node -e "
          require('ts-node/register');
          // Start all consumers
          const p1 = require('./src/domains/validation/consumers/proof-submitted.consumer');
          const p2 = require('./src/domains/rewards/consumers/proof-validated.consumer');
          const r1 = require('./src/domains/raffles/consumers/reward-granted.consumer');
          const r2 = require('./src/domains/raffles/consumers/raffle-draw-executed.consumer');
          // Actually start the consumers (async functions must be awaited)
          Promise.all([
            p1.startProofSubmittedConsumer(),
            p2.startProofValidatedConsumer(),
            r1.startRewardGrantedConsumer(),
            r2.startRaffleDrawExecutedConsumer()
          ]).then(() => console.log('All consumers started'));
          " > worker.log 2>&1 &
          WORKER_PID=$!
          echo $WORKER_PID > worker.pid
          sleep 3
          echo "=== WORKER STARTED ==="
          
          # STEP 3: EXECUTE POST /proofs
          echo "=== STEP 3: EXECUTE POST /proofs ==="
          
          # Get user ID (use seeded test user)
          USER_ID="00000000-0000-0000-0000-000000000001"
          
          # Create a test file
          UNIQUE_CONTENT="test content $(date +%s)"
          echo "$UNIQUE_CONTENT" > /tmp/test.txt
          
          # Generate JWT token for the test user
          JWT_TOKEN=$(node -e "
          const jwt = require('jsonwebtoken');
          const payload = { user_id: '$USER_ID' };
          const secret = 'dev-secret-change-in-production';
          const token = jwt.sign(payload, secret, { expiresIn: '1h' });
          console.log(token);
          ")

          # Make the POST request using JWT token
          RESPONSE=$(curl -s -X POST http://localhost:3000/proofs \
            -H "Authorization: Bearer $JWT_TOKEN" \
            -F "file=@/tmp/test.txt")
          
          echo "Proof submission response: $RESPONSE"
          
          # Wait for async processing by worker
          sleep 15
          
          # STEP 4: TRACE events
          echo "=== STEP 4: TRACE EVENTS ==="
          
          # First check worker logs
          echo "=== CHECKING WORKER LOGS ==="
          cat worker.log 2>/dev/null || echo "No worker log"
          
          EVENTS=$(node -e "
          const { Client } = require('pg');
          (async () => {
            const client = new Client({ connectionString: process.env.NEON_DB_URL, ssl: { rejectUnauthorized: false } });
            await client.connect();
            const res = await client.query('SELECT event_type FROM events.events ORDER BY timestamp');
            console.log(JSON.stringify(res.rows.map(r => r.event_type)));
            await client.end();
          })();
          ")
          echo "Events: $EVENTS"
          
          # Required events to verify
          REQUIRED_EVENTS=("proof_submitted" "fraud_check_requested" "payment_identifier_requested" "fraud_scored" "payment_identifier_extracted" "proof_validated" "reward_granted" "ticket_created")
          
          for event in "${REQUIRED_EVENTS[@]}"; do
            if echo "$EVENTS" | grep -q "$event"; then
              echo "✓ $event found"
            else
              echo "✗ $event NOT FOUND"
              exit 1
            fi
          done
          
          # STEP 5: VERIFY DB counts
          echo "=== STEP 5: VERIFY DB COUNTS ==="
          
          PROOF_COUNT=$(node -e "
          const { Client } = require('pg');
          (async () => {
            const client = new Client({ connectionString: process.env.NEON_DB_URL, ssl: { rejectUnauthorized: false } });
            await client.connect();
            const res = await client.query('SELECT COUNT(*) as cnt FROM validation.proofs');
            console.log(res.rows[0].cnt);
            await client.end();
          })();
          ")
          echo "Proofs: $PROOF_COUNT"
          
          VALIDATION_COUNT=$(node -e "
          const { Client } = require('pg');
          (async () => {
            const client = new Client({ connectionString: process.env.NEON_DB_URL, ssl: { rejectUnauthorized: false } });
            await client.connect();
            const res = await client.query('SELECT COUNT(*) as cnt FROM validation.proof_validations');
            console.log(res.rows[0].cnt);
            await client.end();
          })();
          ")
          echo "Validations: $VALIDATION_COUNT"
          
          REWARD_COUNT=$(node -e "
          const { Client } = require('pg');
          (async () => {
            const client = new Client({ connectionString: process.env.NEON_DB_URL, ssl: { rejectUnauthorized: false } });
            await client.connect();
            const res = await client.query('SELECT COUNT(*) as cnt FROM rewards.rewards');
            console.log(res.rows[0].cnt);
            await client.end();
          })();
          ")
          echo "Rewards: $REWARD_COUNT"
          
          TICKET_COUNT=$(node -e "
          const { Client } = require('pg');
          (async () => {
            const client = new Client({ connectionString: process.env.NEON_DB_URL, ssl: { rejectUnauthorized: false } });
            await client.connect();
            const res = await client.query('SELECT COUNT(*) as cnt FROM rewards.tickets');
            console.log(res.rows[0].cnt);
            await client.end();
          })();
          ")
          echo "Tickets: $TICKET_COUNT"
          
          # Verify counts
          if [ "$PROOF_COUNT" != "1" ] || [ "$VALIDATION_COUNT" != "1" ] || [ "$REWARD_COUNT" != "1" ] || [ "$TICKET_COUNT" != "1" ]; then
            echo "DB counts mismatch! Expected 1 of each."
            exit 1
          fi
          
          # STEP 6: REPEAT SAME REQUEST - idempotency check
          echo "=== STEP 6: IDEMPOTENCY CHECK ==="
          # Use SAME content as step 3 for idempotency test (same hash = duplicate proof)
          echo "$UNIQUE_CONTENT" > /tmp/test.txt
          
          # Get JWT token again
          JWT_TOKEN2=$(node -e "
          const jwt = require('jsonwebtoken');
          const payload = { user_id: '$USER_ID' };
          const secret = 'dev-secret-change-in-production';
          const token = jwt.sign(payload, secret, { expiresIn: '1h' });
          console.log(token);
          ")
          
          curl -s -X POST http://localhost:3000/proofs \
            -H "Authorization: Bearer $JWT_TOKEN2" \
            -F "file=@/tmp/test.txt" > /dev/null
          
          sleep 5
          
          TICKET_COUNT_AFTER=$(node -e "
          const { Client } = require('pg');
          (async () => {
            const client = new Client({ connectionString: process.env.NEON_DB_URL, ssl: { rejectUnauthorized: false } });
            await client.connect();
            const res = await client.query('SELECT COUNT(*) as cnt FROM rewards.tickets');
            console.log(res.rows[0].cnt);
            await client.end();
          })();
          ")
          echo "Tickets after second request: $TICKET_COUNT_AFTER"
          
          if [ "$TICKET_COUNT_AFTER" != "1" ]; then
            echo "IDEMPOTENCY FAILED: New ticket was created!"
            exit 1
          fi
          
          echo "=== ALL E2E STEPS PASSED ==="
          
          # Cleanup
          kill $(cat api.pid) 2>/dev/null || true

      - name: Debug logs
        if: failure()
        run: |
          echo "===== API LOG ====="
          cat apps/api/api.log 2>/dev/null || echo "No log file"

      - name: Cleanup
        if: always()
        run: |
          kill $(cat api.pid) || true