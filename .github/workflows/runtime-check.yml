name: Runtime Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  db-connection-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        run: npm install
        working-directory: apps/api

      - name: Verify pg module
        run: node scripts/verify-pg.js
        working-directory: apps/api

      - name: Test database connection
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: node scripts/db-connection-test.js
        working-directory: apps/api

  db-write-test:
    needs: db-connection-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minimal deps
        run: |
          mkdir tmp-write-test
          cd tmp-write-test
          npm init -y
          npm install pg

      - name: Run write test
        working-directory: apps/api
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: node scripts/db-write-test.js

  runtime-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          cd apps/api
          npm install

      - name: Build
        run: |
          cd apps/api
          npm run build

      - name: Start server
        run: |
          node apps/api/dist/apps/api/src/server/index.js &
          sleep 5

      - name: Health check
        run: curl -s http://localhost:3000/health || echo "Health check done"

  pipeline-e2e-test:
    needs: runtime-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          cd apps/api
          npm install
          mkdir -p ../worker/node_modules
          cp -r apps/api/node_modules/* ../worker/node_modules/ 2>/dev/null || true

      - name: Build API
        run: |
          cd apps/api
          npm run build

      - name: Build Worker
        run: |
          cd apps/worker
          npm install ../../shared/database ../../shared/events ../../shared/config ../../shared/observability ../../shared/utils 2>/dev/null || npm install
          npx tsc

      - name: Start server
        run: |
          node apps/api/dist/apps/api/src/server/index.js &
          sleep 5

      - name: Install test dependencies
        run: |
          npm install uuid
          sudo apt-get update && sudo apt-get install -y uuid-runtime

      - name: Generate PROOF_ID
        id: proof-id
        run: |
          PROOF_ID=$(uuidgen)
          echo "PROOF_ID=$PROOF_ID" >> $GITHUB_ENV
          echo "Created PROOF_ID: $PROOF_ID"

      - name: Install curl
        run: |
          sudo apt-get update && sudo apt-get install -y curl

      - name: TASK 1 — CREATE SINGLE PROOF
        env:
          PROOF_ID: ${{ env.PROOF_ID }}
        run: |
          echo "Creating single proof with PROOF_ID: $PROOF_ID"
          curl -X POST http://localhost:3000/proofs \
            -F "file=@README.md" \
            -F "external_id=$PROOF_ID" \
            -H "Authorization: Bearer TEST_TOKEN" \
            -w "\n%{http_code}" \
            -s -o /tmp/proofresponse.json
          cat /tmp/proofresponse.json
          echo ""

      - name: TASK 2 — ENSURE EVENT EXISTS (Wait for reward_granted)
        env:
          PROOF_ID: ${{ env.PROOF_ID }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "Waiting for reward_granted event with PROOF_ID: $PROOF_ID"
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          const proofId = process.env.PROOF_ID;
          let attempts = 0;
          const maxAttempts = 15;
          
          (async () => {
            await client.connect();
            
            while (attempts < maxAttempts) {
              const result = await client.query(
                "SELECT id FROM events.events WHERE payload::text LIKE $1 AND event_type = '\''reward_granted'\''",
                ["%" + proofId + "%"]
              );
              
              if (result.rows.length > 0) {
                console.log("Found reward_granted event for PROOF_ID:", proofId);
                await client.end();
                process.exit(0);
              }
              
              attempts++;
              console.log("Waiting for event... attempt", attempts, "/", maxAttempts);
              await new Promise(r => setTimeout(r, 1000));
            }
            
            console.error("FAIL: No reward_granted event found after", maxAttempts, "seconds");
            await client.end();
            process.exit(1);
          })();
          '

      - name: TASK 3 — SPAWN COMPETING WORKERS (Start TWO simultaneously)
        env:
          PROOF_ID: ${{ env.PROOF_ID }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "Starting TWO competing workers..."
          # Start worker 1 in background
          node apps/worker/dist/index.js > /tmp/worker1.log 2>&1 &
          WORKER1_PID=$!
          echo "Worker 1 started with PID: $WORKER1_PID"
          
          # Start worker 2 in background
          node apps/worker/dist/index.js > /tmp/worker2.log 2>&1 &
          WORKER2_PID=$!
          echo "Worker 2 started with PID: $WORKER2_PID"
          
          echo "Both workers started - they will compete for events"

      - name: TASK 4 — FORCE CONTENTION WINDOW
        run: |
          echo "Contention window opened - workers polling for events"
          sleep 2

      - name: TASK 5 — WAIT FOR COMPLETION (Polling for ticket)
        env:
          PROOF_ID: ${{ env.PROOF_ID }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "Polling for ticket existence..."
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          const proofId = process.env.PROOF_ID;
          let attempts = 0;
          const maxAttempts = 15;
          
          (async () => {
            await client.connect();
            
            while (attempts < maxAttempts) {
              const result = await client.query(
                "SELECT COUNT(*) as count FROM raffles.tickets WHERE reward_id IN (SELECT id FROM rewards.rewards WHERE proof_id = $1)",
                [proofId]
              );
              
              const count = parseInt(result.rows[0].count, 10);
              if (count > 0) {
                console.log("Ticket found for PROOF_ID:", proofId, "Count:", count);
                await client.end();
                process.exit(0);
              }
              
              attempts++;
              console.log("Waiting for ticket... attempt", attempts, "/", maxAttempts);
              await new Promise(r => setTimeout(r, 1000));
            }
            
            console.error("FAIL: No ticket found after", maxAttempts, "seconds");
            await client.end();
            process.exit(1);
          })();
          '

      - name: TASK 6 — VALIDATE EXACTLY-ONCE (tickets_count == 1)
        env:
          PROOF_ID: ${{ env.PROOF_ID }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          const proofId = process.env.PROOF_ID;
          
          (async () => {
            await client.connect();
            
            // TASK 6: Validate exactly 1 ticket
            const ticketRes = await client.query(
              "SELECT COUNT(*) as count FROM raffles.tickets WHERE reward_id IN (SELECT id FROM rewards.rewards WHERE proof_id = $1)",
              [proofId]
            );
            const ticketsCount = parseInt(ticketRes.rows[0].count, 10);
            console.log("TASK 6 - Tickets count:", ticketsCount);
            
            if (ticketsCount !== 1) {
              console.error("FAIL: Expected exactly 1 ticket, got", ticketsCount);
              await client.end();
              process.exit(1);
            }
            console.log("TASK 6 PASSED: Exactly 1 ticket");
            
            await client.end();
            process.exit(0);
          })();
          '

      - name: TASK 7 — VALIDATE PROCESSED_EVENTS (count == 1)
        env:
          PROOF_ID: ${{ env.PROOF_ID }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          const proofId = process.env.PROOF_ID;
          
          (async () => {
            await client.connect();
            
            // TASK 7: Validate processed_events count == 1
            const processedRes = await client.query(
              "SELECT COUNT(*) as count FROM events.processed_events WHERE consumer_name = '\''reward_granted_consumer'\'' AND event_id IN (SELECT id FROM events.events WHERE payload::text LIKE $1)",
              ["%" + proofId + "%"]
            );
            const processedCount = parseInt(processedRes.rows[0].count, 10);
            console.log("TASK 7 - Processed events count:", processedCount);
            
            if (processedCount !== 1) {
              console.error("FAIL: Expected exactly 1 processed event, got", processedCount);
              await client.end();
              process.exit(1);
            }
            console.log("TASK 7 PASSED: Exactly 1 processed event");
            
            await client.end();
            process.exit(0);
          })();
          '

      - name: TASK 8 — VALIDATE NO DUPLICATE REWARD (count == 1)
        env:
          PROOF_ID: ${{ env.PROOF_ID }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          const proofId = process.env.PROOF_ID;
          
          (async () => {
            await client.connect();
            
            // TASK 8: Validate no duplicate reward
            const rewardRes = await client.query(
              "SELECT COUNT(*) as count FROM rewards.rewards WHERE proof_id = $1",
              [proofId]
            );
            const rewardsCount = parseInt(rewardRes.rows[0].count, 10);
            console.log("TASK 8 - Rewards count:", rewardsCount);
            
            if (rewardsCount !== 1) {
              console.error("FAIL: Expected exactly 1 reward, got", rewardsCount);
              await client.end();
              process.exit(1);
            }
            console.log("TASK 8 PASSED: Exactly 1 reward (no duplicate)");
            
            await client.end();
            process.exit(0);
          })();
          '

      - name: TASK 9 — FAIL HARD
        env:
          PROOF_ID: ${{ env.PROOF_ID }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          const proofId = process.env.PROOF_ID;
          
          (async () => {
            await client.connect();
            
            let hasFailure = false;
            
            // Check tickets
            const ticketRes = await client.query(
              "SELECT COUNT(*) as count FROM raffles.tickets WHERE reward_id IN (SELECT id FROM rewards.rewards WHERE proof_id = $1)",
              [proofId]
            );
            const ticketsCount = parseInt(ticketRes.rows[0].count, 10);
            console.log("FAIL CHECK - Tickets:", ticketsCount);
            if (ticketsCount > 1) {
              console.error("FAIL: Duplicate tickets detected!");
              hasFailure = true;
            } else if (ticketsCount === 0) {
              console.error("FAIL: No ticket created!");
              hasFailure = true;
            }
            
            // Check rewards
            const rewardRes = await client.query(
              "SELECT COUNT(*) as count FROM rewards.rewards WHERE proof_id = $1",
              [proofId]
            );
            const rewardsCount = parseInt(rewardRes.rows[0].count, 10);
            console.log("FAIL CHECK - Rewards:", rewardsCount);
            if (rewardsCount > 1) {
              console.error("FAIL: Duplicate rewards detected!");
              hasFailure = true;
            }
            
            // Check processed events
            const processedRes = await client.query(
              "SELECT COUNT(*) as count FROM events.processed_events WHERE consumer_name = '\''reward_granted_consumer'\'' AND event_id IN (SELECT id FROM events.events WHERE payload::text LIKE $1)",
              ["%" + proofId + "%"]
            );
            const processedCount = parseInt(processedRes.rows[0].count, 10);
            console.log("FAIL CHECK - Processed events:", processedCount);
            if (processedCount > 1) {
              console.error("FAIL: Event processed multiple times!");
              hasFailure = true;
            }
            
            if (hasFailure) {
              console.error("\n❌ TASK 9 FAILED: Race condition validation FAILED");
              process.exit(1);
            }
            
            console.log("\n✅ TASK 9 PASSED: All validations passed");
            console.log("  - Exactly 1 ticket");
            console.log("  - Exactly 1 reward");
            console.log("  - Exactly 1 processed event");
            console.log("  - Exactly-once behavior proven!");
            
            await client.end();
            process.exit(0);
          })();
          '

      # ========================================================================
      # RACE CONDITION TEST: Force concurrent event consumption
      # ========================================================================
      - name: Generate EXTERNAL_ID for race test
        id: race-test-setup
        run: |
          # Generate unique external_id for race condition test
          EXTERNAL_ID=$(uuidgen | tr '[:upper:]' '[:lower:]')
          echo "EXTERNAL_ID=$EXTERNAL_ID" >> $GITHUB_ENV
          echo "Race test external_id: $EXTERNAL_ID"

      - name: Fire single proof request
        env:
          EXTERNAL_ID: ${{ env.EXTERNAL_ID }}
        run: |
          echo "Creating proof with external_id: $EXTERNAL_ID"
          # Only ONE request - we want to test race condition on event processing
          RESPONSE=$(curl -s -X POST http://localhost:3000/proofs \
            -F "file=@README.md" \
            -F "external_id=$EXTERNAL_ID" \
            -H "Authorization: Bearer TEST_TOKEN")
          echo "API result: $RESPONSE"

      # Wait a moment for async event emission
      - name: Wait for event emission
        run: sleep 3

      # ========================================================================
      # Spawn workers to compete for events
      # ========================================================================
      - name: Install worker dependencies
        run: |
          mkdir -p apps/worker
          cd apps/worker
          npm init -y
          npm install pg uuid
          cp -r ../shared ./node_modules/
          # Create a minimal worker entry that runs consumers
          cat > index.js << 'WORKER_EOF'
          const { Client } = require("pg");
          const { EventEmitter } = require("events");
          
          const POLL_INTERVAL = 500; // ms - smaller for faster contention
          const DB_URL = process.env.NEON_DB_URL;
          
          async function connect() {
            const client = new Client({ connectionString: DB_URL, ssl: true });
            await client.connect();
            return client;
          }
          
          async function processRewardGranted(db) {
            // Find unprocessed reward_granted events
            const events = await db.query(
              "SELECT e.id, e.payload FROM events.events e \
               WHERE e.event_type = '\''reward_granted'\'' \
               AND NOT EXISTS ( \
                 SELECT 1 FROM events.processed_events pe \
                 WHERE pe.event_id = e.id AND pe.consumer_name = '\''reward_granted_consumer'\'' \
               ) \
               LIMIT 1"
            );
            if (events.rows.length === 0) return false;
            const event = events.rows[0];
            console.log("Worker processing event:", event.id);
            
            // Parse payload to get proof_id
            const payload = typeof event.payload === 'string' ? JSON.parse(event.payload) : event.payload;
            const proofId = payload.proof_id || payload.proofId;
            if (!proofId) {
              console.log("No proof_id in payload, skipping");
              await db.query(
                "INSERT INTO events.processed_events (id, event_id, consumer_name, processed_at) VALUES (gen_random_uuid(), $1, '\''reward_granted_consumer'\'', NOW())",
                [event.id]
              );
              return true;
            }
            
            // Check if reward already exists (idempotency check)
            const existing = await db.query(
              "SELECT id FROM rewards.rewards WHERE proof_id = $1",
              [proofId]
            );
            if (existing.rows.length > 0) {
              console.log("Reward already exists for proof:", proofId);
              await db.query(
                "INSERT INTO events.processed_events (id, event_id, consumer_name, processed_at) VALUES (gen_random_uuid(), $1, '\''reward_granted_consumer'\'', NOW())",
                [event.id]
              );
              return true;
            }
            
            console.log("Creating reward for proof:", proofId);
            // Get user_id from proof
            const proof = await db.query(
              "SELECT user_id FROM validation.proofs WHERE id = $1",
              [proofId]
            );
            if (proof.rows.length === 0) {
              console.log("Proof not found, marking as processed");
              await db.query(
                "INSERT INTO events.processed_events (id, event_id, consumer_name, processed_at) VALUES (gen_random_uuid(), $1, '\''reward_granted_consumer'\'', NOW())",
                [event.id]
              );
              return true;
            }
            const userId = proof.rows[0].user_id;
            
            // Create reward (idempotent)
            await db.query(
              "INSERT INTO rewards.rewards (id, proof_id, user_id, amount, status) VALUES (gen_random_uuid(), $1, $2, 100, '\''active'\'') ON CONFLICT DO NOTHING",
              [proofId, userId]
            );
            
            // Create ticket (idempotent)
            await db.query(
              "INSERT INTO raffles.tickets (id, reward_id, raffle_id, created_at) \
               SELECT gen_random_uuid(), r.id, (SELECT id FROM raffles.raffles WHERE status = '\''active'\'' LIMIT 1), NOW() \
               FROM rewards.rewards r WHERE r.proof_id = $1 \
               ON CONFLICT DO NOTHING",
              [proofId]
            );
            
            // Mark event as processed
            await db.query(
              "INSERT INTO events.processed_events (id, event_id, consumer_name, processed_at) VALUES (gen_random_uuid(), $1, '\''reward_granted_consumer'\'', NOW())",
              [event.id]
            );
            
            console.log("Reward and ticket created for proof:", proofId);
            return true;
          }
          
          async function runWorker(name) {
            console.log("Worker", name, "starting...");
            const db = await connect();
            let processed = 0;
            while (processed < 100) {
              const result = await processRewardGranted(db);
              if (result) processed++;
              await new Promise(r => setTimeout(r, POLL_INTERVAL));
            }
            console.log("Worker", name, "finished. Processed:", processed);
            await db.end();
          }
          
          runWorker(process.argv[2] || "worker");
          WORKER_EOF

      # ========================================================================
      # TASK 4: FORCE CONTENTION (start workers immediately)
      # ========================================================================
      - name: Start competing workers
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "Starting two workers simultaneously..."
          cd apps/worker
          node index.js "worker-A" &
          node index.js "worker-B" &
          echo "Both workers started"

      # ========================================================================
      # TASK 5: WAIT FOR COMPLETION (polling until ticket exists, max 15s)
      # ========================================================================
      - name: Wait for ticket creation
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          EXTERNAL_ID: ${{ env.EXTERNAL_ID }}
        run: |
          echo "Waiting for ticket creation..."
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          (async () => {
            await client.connect();
            const extId = process.env.EXTERNAL_ID;
            
            // Get internal proof_id
            const proofRes = await client.query(
              "SELECT id FROM validation.proofs WHERE external_id = $1",
              [extId]
            );
            if (proofRes.rows.length === 0) {
              console.error("FAIL: No proof for external_id:", extId);
              await client.end();
              process.exit(1);
            }
            const proofId = proofRes.rows[0].id;
            let ticketFound = false;
            console.log("Looking for proof_id:", proofId);
            for (let i = 0; i < 15; i++) {
              const res = await client.query(
                "SELECT COUNT(*) as count FROM raffles.tickets t \
                 JOIN rewards.rewards r ON t.reward_id = r.id \
                 WHERE r.proof_id = $1",
                [proofId]
              );
              const count = parseInt(res.rows[0].count, 10);
              console.log("Attempt", i+1, "- tickets:", count);
              if (count > 0) {
                ticketFound = true;
                console.log("Ticket found after", i+1, "attempts");
                break;
              }
              await new Promise(r => setTimeout(r, 1000));
            }
            await client.end();
            if (!ticketFound) {
              console.error("FAIL: No ticket created after 15 seconds");
              process.exit(1);
            }
            console.log("Ticket found!");
          })();
          '

      # Kill workers
      - name: Stop workers
        run: |
          pkill -f "node index.js" || true
          sleep 1

      # ========================================================================
      # TASK 6: VALIDATE EXACTLY-ONCE (tickets == 1)
      # ========================================================================
      - name: Validate exactly-once tickets
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          EXTERNAL_ID: ${{ env.EXTERNAL_ID }}
        run: |
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          (async () => {
            await client.connect();
            const extId = process.env.EXTERNAL_ID;
            
            // First get internal proof_id from external_id
            const proofRes = await client.query(
              "SELECT id FROM validation.proofs WHERE external_id = $1",
              [extId]
            );
            if (proofRes.rows.length === 0) {
              console.error("FAIL: No proof for external_id:", extId);
              await client.end();
              process.exit(1);
            }
            const proofId = proofRes.rows[0].id;
            console.log("Validating tickets for proof_id:", proofId);
            
            const ticketRes = await client.query(
              "SELECT COUNT(*) as count FROM raffles.tickets \
               WHERE reward_id IN (SELECT id FROM rewards.rewards WHERE proof_id = $1)",
              [proofId]
            );
            const ticketsCount = parseInt(ticketRes.rows[0].count, 10);
            console.log("Tickets count:", ticketsCount);
            
            if (ticketsCount !== 1) {
              console.error("FAIL: Expected exactly 1 ticket, got", ticketsCount);
              await client.end();
              process.exit(1);
            }
            console.log("VALIDATED: Exactly 1 ticket");
            await client.end();
          })();
          '

      # ========================================================================
      # TASK 7: VALIDATE PROCESSED_EVENTS (count == 1)
      # ========================================================================
      - name: Validate processed_events count
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          EXTERNAL_ID: ${{ env.EXTERNAL_ID }}
        run: |
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          (async () => {
            await client.connect();
            const extId = process.env.EXTERNAL_ID;
            
            // Get internal proof_id
            const proofRes = await client.query(
              "SELECT id FROM validation.proofs WHERE external_id = $1",
              [extId]
            );
            if (proofRes.rows.length === 0) {
              console.error("FAIL: No proof for external_id:", extId);
              await client.end();
              process.exit(1);
            }
            const proofId = proofRes.rows[0].id;
            console.log("Validating processed_events for proof_id:", proofId);
            
            const eventRes = await client.query(
              "SELECT COUNT(*) as count FROM events.processed_events \
               WHERE consumer_name = '\''reward_granted_consumer'\'' \
               AND event_id IN (SELECT id FROM events.events WHERE payload::text LIKE '\''%' || $1 || '%'\'')",
              [proofId]
            );
            const processedCount = parseInt(eventRes.rows[0].count, 10);
            console.log("Processed events count:", processedCount);
            
            if (processedCount !== 1) {
              console.error("FAIL: Expected exactly 1 processed event, got", processedCount);
              await client.end();
              process.exit(1);
            }
            console.log("VALIDATED: Exactly 1 processed event");
            await client.end();
          })();
          '

      # ========================================================================
      # TASK 8: VALIDATE NO DUPLICATE REWARD (rewards == 1)
      # ========================================================================
      - name: Validate no duplicate reward
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          EXTERNAL_ID: ${{ env.EXTERNAL_ID }}
        run: |
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          (async () => {
            await client.connect();
            const extId = process.env.EXTERNAL_ID;
            
            // Get internal proof_id
            const proofRes = await client.query(
              "SELECT id FROM validation.proofs WHERE external_id = $1",
              [extId]
            );
            if (proofRes.rows.length === 0) {
              console.error("FAIL: No proof for external_id:", extId);
              await client.end();
              process.exit(1);
            }
            const proofId = proofRes.rows[0].id;
            console.log("Validating rewards for proof_id:", proofId);
            
            const rewardRes = await client.query(
              "SELECT COUNT(*) as count FROM rewards.rewards WHERE proof_id = $1",
              [proofId]
            );
            const rewardsCount = parseInt(rewardRes.rows[0].count, 10);
            console.log("Rewards count:", rewardsCount);
            
            if (rewardsCount !== 1) {
              console.error("FAIL: Expected exactly 1 reward, got", rewardsCount);
              await client.end();
              process.exit(1);
            }
            console.log("VALIDATED: Exactly 1 reward");
            await client.end();
          })();
          '

      # ========================================================================
      # TASK 9: FAIL HARD IF ANY VALIDATION FAILS
      # ========================================================================
      - name: Final validation summary
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          EXTERNAL_ID: ${{ env.EXTERNAL_ID }}
        run: |
          node -e '
          const { Client } = require("pg");
          const client = new Client({
            connectionString: process.env.NEON_DB_URL,
            ssl: true,
          });
          
          (async () => {
            await client.connect();
            const extId = process.env.EXTERNAL_ID;
            
            // Get internal proof_id
            const proofRes = await client.query(
              "SELECT id FROM validation.proofs WHERE external_id = $1",
              [extId]
            );
            if (proofRes.rows.length === 0) {
              console.error("FAIL: No proof for external_id:", extId);
              await client.end();
              process.exit(1);
            }
            const proofId = proofRes.rows[0].id;
            console.log("Final validation for proof_id:", proofId);
            let hasFailure = false;
            
            // Check tickets
            const ticketRes = await client.query(
              "SELECT COUNT(*) as count FROM raffles.tickets \
               WHERE reward_id IN (SELECT id FROM rewards.rewards WHERE proof_id = $1)",
              [proofId]
            );
            const ticketsCount = parseInt(ticketRes.rows[0].count, 10);
            console.log("Tickets:", ticketsCount, ticketsCount === 1 ? "✓" : "✗ FAIL");
            if (ticketsCount !== 1) hasFailure = true;
            
            // Check rewards
            const rewardRes = await client.query(
              "SELECT COUNT(*) as count FROM rewards.rewards WHERE proof_id = $1",
              [proofId]
            );
            const rewardsCount = parseInt(rewardRes.rows[0].count, 10);
            console.log("Rewards:", rewardsCount, rewardsCount === 1 ? "✓" : "✗ FAIL");
            if (rewardsCount !== 1) hasFailure = true;
            
            // Check processed_events
            const processedRes = await client.query(
              "SELECT COUNT(*) as count FROM events.processed_events \
               WHERE consumer_name = '\''reward_granted_consumer'\'' \
               AND event_id IN (SELECT id FROM events.events WHERE payload::text LIKE '\''%' || $1 || '%'\'')",
              [proofId]
            );
            const processedCount = parseInt(processedRes.rows[0].count, 10);
            console.log("Processed events:", processedCount, processedCount === 1 ? "✓" : "✗ FAIL");
            if (processedCount !== 1) hasFailure = true;
            
            await client.end();
            
            if (hasFailure) {
              console.error("\n❌ RACE CONDITION TEST FAILED");
              console.error("Exactly-once behavior NOT guaranteed!");
              process.exit(1);
            }
            
            console.log("\n✅ SUCCESS: Exactly-once behavior proven!");
            console.log("  - Concurrent workers competed");
            console.log("  - Only one processed the event");
            console.log("  - No duplicates created");
            process.exit(0);
          })();
          '

      - name: Report success
        run: |
          echo ""
          echo "=========================================="
          echo "✅ Race condition + retry validation PASSED"
          echo "=========================================="
          echo "Concurrent workers competed"
          echo "Only one processed the event"
          echo "Retries did not duplicate"
          echo "Exactly-once behavior proven!"