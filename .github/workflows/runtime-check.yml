name: Runtime Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  db-connection-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install API dependencies
        run: npm install
        working-directory: apps/api

      - name: Verify pg module
        run: node scripts/verify-pg.js
        working-directory: apps/api

      - name: Test database connection
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: node scripts/db-connection-test.js
        working-directory: apps/api

  db-write-test:
    needs: db-connection-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minimal deps
        run: |
          mkdir tmp-write-test
          cd tmp-write-test
          npm init -y
          npm install pg

      - name: Run write test
        working-directory: apps/api
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: node scripts/db-write-test.js

  runtime-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          cd apps/api
          npm install

      - name: Build
        run: |
          cd apps/api
          npm run build

      - name: Start server
        run: |
          node apps/api/dist/apps/api/src/server/index.js &
          sleep 5

      - name: Health check
        run: curl -s http://localhost:3000/health || echo "Health check done"