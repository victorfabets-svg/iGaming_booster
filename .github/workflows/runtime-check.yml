name: Runtime Validation

on:
  workflow_dispatch: {}

jobs:
  runtime-check:
    runs-on: ubuntu-latest

steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: '20'

  - name: Install deps
    run: npm install

  - name: Build
    run: npm run build

  - name: Start server
    run: |
      export NEON_DB_URL="${{ secrets.NEON_DB_URL }}"
      export R2_ENDPOINT="${{ secrets.R2_ENDPOINT }}"
      export R2_BUCKET="${{ secrets.R2_BUCKET }}"
      export R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}"
      export R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}"

      node apps/api/dist/apps/api/src/server/index.js &
      sleep 5

  - name: Health check
    run: |
      curl -s http://localhost:3000/health

  - name: Test proof upload
    run: |
      echo "test" > test.txt
      curl -X POST http://localhost:3000/proofs \
        -F "file=@test.txt" \
        -F "user_id=test-user"
