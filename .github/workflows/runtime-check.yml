- name: Start server (debug mode)
  env:
    DATABASE_URL: ${{ secrets.NEON_DB_URL }}
  run: |
    FILE=$(find apps/api/dist -name index.js | grep server/index.js | head -n 1)

    echo "Found entry: $FILE"

    if [ -z "$FILE" ]; then
      echo "Server entry not found"
      exit 1
    fi

    echo "=== STARTING SERVER ==="
    node $FILE
