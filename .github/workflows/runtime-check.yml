name: Runtime Validation

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.NEON_DB_URL }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: |
          cd apps/api
          npm install

      - name: Build
        run: |
          cd apps/api
          npm run build

      - name: Find server entry (after build)
        id: find-server
        run: |
          SERVER_PATH=$(find apps/api/dist -name index.js | grep server | head -1)
          if [ -z "$SERVER_PATH" ]; then
            echo "ERROR: Server entry not found"
            exit 1
          fi
          echo "Server path: $SERVER_PATH"
          echo "server_path=$SERVER_PATH" >> $GITHUB_OUTPUT

      - name: Start server
        run: |
          node ${{ steps.find-server.outputs.server_path }} &
          echo "Server started, waiting for it to be ready..."
          sleep 10

      - name: Health check
        run: curl -s http://localhost:3000/health || echo "Health check completed"

      - name: Upload proof
        run: |
          echo "test file content" > test.txt
          curl -s -X POST http://localhost:3000/proofs \
            -F "user_id=11111111-1111-1111-1111-111111111111" \
            -F "file=@test.txt" || echo "Upload attempted"