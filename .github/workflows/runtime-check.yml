name: Runtime Validation

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  db-connection-check:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install

      - name: Test database connection
        env:
          NEON_DB_URL: postgresql://test:test@postgres:5432/test
        run: |
          for i in {1..10}; do
            node -e "
            const { Client } = require('pg');
            const client = new Client({ connectionString: process.env.NEON_DB_URL });
            client.connect()
              .then(() => { console.log('DB Connected'); return client.query('SELECT 1'); })
              .then(() => { console.log('Query OK'); client.end(); process.exit(0); })
              .catch(e => { console.error('Error:', e.message); process.exit(1); });
            " && break
            echo "Attempt $i failed, retrying..."
            sleep 2
          done || (echo "All retries failed" && exit 1)

  db-write-test:
    needs: db-connection-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install minimal deps
        run: |
          mkdir tmp-write-test
          cd tmp-write-test
          npm init -y
          npm install pg

      - name: Run write test
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          NODE_PATH: ./tmp-write-test/node_modules
        run: |
          node -e "
          const { Client } = require('pg');

          const client = new Client({
            connectionString: process.env.NEON_DB_URL
          });

          async function run() {
            await client.connect();

            console.log('Connected to Neon');

            // INSERT
            const insert = await client.query(
              \"INSERT INTO validation.proofs (id, user_id, file_url, created_at)
               VALUES (gen_random_uuid(), 'test-user-ci', 'https://test.com/file.png', NOW())
               RETURNING *;\"
            );

            console.log('INSERT RESULT');
            console.table(insert.rows);

            // READ
            const read = await client.query(
              \"SELECT * FROM validation.proofs
               WHERE user_id = 'test-user-ci'
               ORDER BY created_at DESC
               LIMIT 1;\"
            );

            console.log('READ RESULT');
            console.table(read.rows);

            await client.end();
          }

          run().catch(err => {
            console.error(err);
            process.exit(1);
          });
          "

  runtime-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Build Worker (optional)
        run: |
          if [ -f "apps/worker/package.json" ]; then
            cd apps/worker
            npm install
            npm run build
            echo "✅ Worker built"
          else
            echo "⚠️ Worker not present — skipping worker build"
          fi

      - name: Install API dependencies
        run: |
          cd apps/api
          npm install

      - name: Build API
        run: |
          cd apps/api
          npm run build

      - name: Start server
        run: |
          # Set env for local testing
          export NODE_ENV=development
          export NEON_DB_URL="${{ secrets.NEON_DB_URL }}"
          export JWT_SECRET=test-secret-for-ci
          export CANARY_TOKEN=test-canary-token
          
          cd apps/api
          
          # Start API in background with log capture
          node dist/server.js > $PWD/api.log 2>&1 &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          echo "Started API with PID $API_PID (logs: $PWD/api.log)"

      - name: Wait for API to be ready
        run: |
          # Ensure jq is installed
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          echo "Starting readiness check..."

          for i in {1..30}; do
            # Safe response capture with --fail for proper HTTP errors
            RESPONSE=$(curl -s --fail http://localhost:3000/health/db 2>/dev/null || echo "")

            # Validate response not empty
            if [[ -z "$RESPONSE" ]]; then
              echo "Attempt $i: Empty response, waiting..."
              sleep 1
              continue
            fi

            # Safe JSON parse with fallback
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "invalid"' 2>/dev/null || echo "invalid")

            echo "Attempt $i: Status = $STATUS"

            # Strict validation
            if [[ "$STATUS" == "ok" ]]; then
              echo "✅ System ready (DB connected)"
              exit 0
            fi

            # Any other status (degraded, error, invalid) - still wait
            sleep 1
          done

          # Failed after all retries
          echo "❌ System never became ready"
          echo "Final response: $RESPONSE"
          exit 1

      - name: Start Worker (optional)
        run: |
          if [ -f "apps/worker/package.json" ]; then
            cd apps/worker
            npm install
            npm run build
            
            export NODE_ENV=development
            export NEON_DB_URL="${{ secrets.NEON_DB_URL }}"
            export JWT_SECRET=test-secret-for-ci
            
            node dist/index.js &
            WORKER_PID=$!
            echo "WORKER_PID=$WORKER_PID" >> $GITHUB_ENV
            echo "✅ Worker started with PID $WORKER_PID"
          else
            echo "⚠️ Worker not present — skipping worker"
          fi

      - name: Run E2E tests against live system
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          echo "Running E2E tests..."
          npm run test:e2e || { echo "E2E failed"; exit 1; }
          echo "✅ E2E tests passed"

      - name: Debug snapshot on failure
        if: failure()
        run: |
          echo "===== API LOG ====="
          cat apps/api/api.log 2>/dev/null || echo "No log file"

          echo ""
          echo "===== RUNNING PROCESSES ====="
          ps aux | grep -E "node|api" | grep -v grep || true

          echo ""
          echo "===== PORT BINDINGS ====="
          ss -tuln 2>/dev/null || netstat -tuln 2>/dev/null || echo "ss/netstat not available"

          echo ""
          echo "===== LAST HEALTH CHECK ====="
          curl -sv http://localhost:3000/health/db 2>&1 || echo "Health endpoint unreachable"

      - name: Cleanup processes
        if: always()
        run: |
          if [ -n "${{ env.API_PID }}" ]; then
            kill ${{ env.API_PID }} 2>/dev/null || true
            echo "Killed API"
          fi
          if [ -n "${{ env.WORKER_PID }}" ]; then
            kill ${{ env.WORKER_PID }} 2>/dev/null || true
            echo "Killed Worker"
          fi