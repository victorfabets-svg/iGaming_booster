name: Runtime Validation

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main

jobs:
  db-connection-check:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h postgres -p 5432 -U test && echo "DB ready" && exit 0
            echo "Waiting for DB..."
            sleep 3
          done
          echo "DB not ready" && exit 1

      - name: Debug network
        run: |
          ping -c 2 postgres || true
          nc -zv postgres 5432 || true

      - name: Test DB manually
        run: |
          node -e "
          const { Client } = require('pg');
          const client = new Client({ connectionString: process.env.NEON_DB_URL });
          client.connect()
          .then(() => { console.log('CONNECTED'); return client.end(); })
          .catch(e => { console.error(e); process.exit(1); });
          "

      - name: Test database connection
        env:
          NEON_DB_URL: postgresql://test:test@postgres:5432/test
        run: |
          node -e "
          const { Client } = require('pg');
          const client = new Client({
            connectionString: process.env.NEON_DB_URL
          });
          client.connect()
            .then(() => { console.log('DB Connected'); return client.query('SELECT 1'); })
            .then(() => { console.log('Query OK'); client.end(); })
            .catch(err => { console.error(err); process.exit(1); });
          "

  db-write-test:
    needs: db-connection-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Install minimal deps
        run: |
          mkdir tmp-write-test
          cd tmp-write-test
          npm init -y
          npm install pg

      - name: Run write test
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          NODE_PATH: ./tmp-write-test/node_modules
        run: |
          node -e "
          const { Client } = require('pg');

          const client = new Client({
            connectionString: process.env.NEON_DB_URL
          });

          async function run() {
            await client.connect();

            console.log('Connected to Neon');

            // INSERT
            const insert = await client.query(
              \"INSERT INTO validation.proofs (id, user_id, file_url, created_at)
               VALUES (gen_random_uuid(), 'test-user-ci', 'https://test.com/file.png', NOW())
               RETURNING *;\"
            );

            console.log('INSERT RESULT');
            console.table(insert.rows);

            // READ
            const read = await client.query(
              \"SELECT * FROM validation.proofs
               WHERE user_id = 'test-user-ci'
               ORDER BY created_at DESC
               LIMIT 1;\"
            );

            console.log('READ RESULT');
            console.table(read.rows);

            await client.end();
          }

          run().catch(err => {
            console.error(err);
            process.exit(1);
          });
          "

  runtime-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Install deps
        run: |
          cd apps/api
          npm install

      - name: Build
        run: |
          cd apps/api
          npm run build

      - name: Start server
        run: |
          node apps/api/dist/apps/api/src/server/index.js &
          sleep 5

      - name: Health check
        run: curl -s http://localhost:3000/health || echo "Health check done"