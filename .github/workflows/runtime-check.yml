name: Runtime Validation

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
  PORT: 3000
  HOST: 0.0.0.0
  NODE_ENV: development
  JWT_SECRET: test-jwt-secret-ci
  CANARY_TOKEN: test-canary-token

jobs:

  runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check merge conflicts
        run: |
          echo "Checking for merge conflict markers..."
          if grep -rn "<<<<<<< HEAD" . --include="*.ts" --include="*.js" --include="*.json" 2>/dev/null | grep -v "node_modules"; then
            echo "❌ Merge conflict markers found"
            exit 1
          fi
          echo "✅ No merge conflict markers found"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install dependencies
        run: |
          echo "Cleaning any corrupted node_modules..."
          rm -rf node_modules package-lock.json
          rm -rf apps/api/node_modules apps/api/package-lock.json
          rm -rf apps/worker/node_modules apps/worker/package-lock.json
          npm install

      - name: Install API dependencies
        run: |
          cd apps/api
          npm install

      - name: Install Worker dependencies
        run: |
          cd apps/worker
          npm install

      - name: Validate ENV
        run: |
          echo "Validating NEON_DB_URL..."
          test -n "$NEON_DB_URL" || (echo "NEON_DB_URL missing" && exit 1)

      - name: Build API
        run: |
          cd apps/api
          npm run build

      - name: Build Worker
        run: |
          cd apps/worker
          npm run build

      - name: Verify API artifact
        run: |
          echo "Verifying API artifact..."
          ls -la apps/api/dist/apps/api/src/server/index.js

      - name: Verify Worker artifact
        run: |
          echo "Verifying Worker artifact..."
          echo "Worker dist contents:"
          ls -la apps/worker/dist
          test -f apps/worker/dist/worker.js || (echo "worker artifact missing" && exit 1)

      - name: Start API
        run: |
          echo "Starting API..."
          cd apps/api
          node dist/apps/api/src/server/index.js > $PWD/api.log 2>&1 &
          echo $! > $PWD/api.pid
          echo "API PID: $(cat $PWD/api.pid)"

      - name: Wait API ready
        run: |
          echo "Waiting for API to be ready..."
          for i in {1..15}; do
            if curl -sf http://localhost:$PORT/health/db > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Attempt $i - waiting..."
            sleep 2
          done
          echo "API failed to start"
          cat apps/api/api.log 2>/dev/null || true
          exit 1

      - name: Verify API health
        run: |
          echo "Verifying API health..."
          curl -sf http://localhost:$PORT/health/db || exit 1
          echo "API health OK"

      - name: Start Worker
        run: |
          echo "Starting Worker..."
          cd apps/worker
          node dist/worker.js > $PWD/worker.log 2>&1 &
          echo $! > $PWD/worker.pid
          echo "Worker PID: $(cat $PWD/worker.pid)"

      - name: Wait Worker startup
        run: |
          sleep 3
          echo "Checking Worker process..."

      - name: Check worker alive
        run: |
          WORKER_PID=$(cat apps/worker/worker.pid 2>/dev/null)
          if [ -n "$WORKER_PID" ]; then
            ps -p $WORKER_PID > /dev/null && echo "Worker is alive" || (echo "Worker crashed" && cat apps/worker/worker.log 2>/dev/null && exit 1)
          else
            echo "Worker PID file missing"
            exit 1
          fi

      - name: Run E2E validation
        run: |
          echo "E2E validation..."
          # Submit test proof
          curl -sf -X POST http://localhost:$PORT/proofs \
            -H "Content-Type: application/json" \
            -d '{"user_id":"ci-test-user","file_url":"https://example.com/test.jpg"}' \
            || true
          echo "Test proof submitted"

      - name: Validate event chain
        run: |
          sleep 3
          echo "Validating event chain..."
          # Check events were created
          curl -sf http://localhost:$PORT/events | head -50 || true

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up..."
          if [ -f apps/api/api.pid ]; then
            kill $(cat apps/api/api.pid) 2>/dev/null || true
          fi
          if [ -f apps/worker/worker.pid ]; then
            kill $(cat apps/worker/worker.pid) 2>/dev/null || true
          fi
          echo "Cleanup complete"
