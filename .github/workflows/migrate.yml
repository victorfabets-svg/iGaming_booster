name: Migrate Database

# Manual-only trigger. Required so DDL never runs as a side-effect of merging.
# A repo admin (or anyone with workflow_dispatch permission) invokes it
# explicitly after reviewing what migrations are pending on the target branch.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to run migrations from (default: main)'
        required: false
        default: 'main'
      reconcile:
        description: 'Reconcile mode: treat "already exists" errors as already-applied (recover from drift)'
        required: false
        type: boolean
        default: false

# Secret mapping note (intentional, see PR #50):
#   NEON_DB_URL_DIRECT      -> neondb_owner, direct endpoint  (used here)
#   NEON_DB_URL             -> neondb_owner, pooled
#   NEON_DB_MIGRATIONS      -> app_user,    pooled            (reserved for future runtime)
#   NEON_DB_MIGRATIONS_DIRECT -> app_user,  direct            (reserved for future runtime)
# The secret names map to ROLE identity, not workload, in this repo.

jobs:
  migrate:
    runs-on: ubuntu-latest
    # Single concurrent run — DDL on a shared DB is not parallel-safe.
    concurrency:
      group: migrate-db
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Validate migration secret is set
        env:
          NEON_DB_URL_DIRECT: ${{ secrets.NEON_DB_URL_DIRECT }}
        run: |
          test -n "$NEON_DB_URL_DIRECT" \
            || (echo "NEON_DB_URL_DIRECT secret is not set" && exit 1)

      - name: Verify role has CREATE on database
        env:
          NEON_DB_URL_DIRECT: ${{ secrets.NEON_DB_URL_DIRECT }}
        run: |
          set -euo pipefail
          node -e "
            const { Client } = require('pg');
            (async () => {
              const c = new Client({ connectionString: process.env.NEON_DB_URL_DIRECT });
              await c.connect();
              const r = await c.query(\`
                SELECT current_user AS role,
                       current_database() AS db,
                       has_database_privilege(current_user, current_database(), 'CREATE') AS can_create
              \`);
              const { role, db, can_create } = r.rows[0];
              console.log('connected role:', role);
              console.log('database:', db);
              console.log('CREATE privilege:', can_create);
              await c.end();
              if (!can_create) {
                console.error('FAIL: role \"' + role + '\" lacks CREATE on database \"' + db + '\".');
                console.error('Likely cause: NEON_DB_URL_DIRECT was set to a non-owner role.');
                console.error('Replace the secret value with the neondb_owner direct connection');
                console.error('string from Neon Console -> Connect -> Role: neondb_owner ->');
                console.error('Connection type: Direct.');
                process.exit(1);
              }
            })().catch(e => { console.error('preflight error:', e.message); process.exit(1); });
          "

      - name: Verify role has CREATE on database
        env:
          NEON_DB_MIGRATIONS_DIRECT: ${{ secrets.NEON_DB_MIGRATIONS_DIRECT }}
        run: |
          set -euo pipefail
          node -e "
            const { Client } = require('pg');
            (async () => {
              const c = new Client({ connectionString: process.env.NEON_DB_MIGRATIONS_DIRECT });
              await c.connect();
              const r = await c.query(\`
                SELECT current_user AS role,
                       current_database() AS db,
                       has_database_privilege(current_user, current_database(), 'CREATE') AS can_create
              \`);
              const { role, db, can_create } = r.rows[0];
              console.log('connected role:', role);
              console.log('database:', db);
              console.log('CREATE privilege:', can_create);
              await c.end();
              if (!can_create) {
                console.error('FAIL: role \"' + role + '\" lacks CREATE on database \"' + db + '\".');
                console.error('Likely cause: NEON_DB_MIGRATIONS_DIRECT was set to the app_user');
                console.error('connection string. Replace with the neondb_owner string from');
                console.error('Neon Console -> Connect -> Role: neondb_owner.');
                process.exit(1);
              }
            })().catch(e => { console.error('preflight error:', e.message); process.exit(1); });
          "

      - name: Run migrations
        env:
          # Owner role on the direct (non-pooled) endpoint — required for DDL
          # because the pooler in transaction mode does not support all session
          # features migrations rely on.
          NEON_DB_URL_DIRECT: ${{ secrets.NEON_DB_URL_DIRECT }}
          MIGRATIONS_RECONCILE: ${{ inputs.reconcile }}
        run: |
          cd apps/api
          npm run migrate
