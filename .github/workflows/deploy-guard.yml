name: Deploy Guard — DB Host Validation

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  canary-db-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure jq installed
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Hit canary health endpoint (with retries)
        run: |
          set -e

          URL="${{ secrets.CANARY_URL }}/health/db"
          HEADER="x-internal-check: true"
          AUTH="x-canary-token: ${{ secrets.CANARY_TOKEN }}"

          # Fetch response
          RESPONSE=""
          for i in 1 2 3; do
            echo "Attempt $i..."
            RESPONSE=$(curl -s -m 5 -H "$HEADER" -H "$AUTH" -D - "$URL" || true)

            if [[ -n "$RESPONSE" && "$RESPONSE" != *"Connection refused"* ]]; then
              echo "Got response"
              break
            fi

            echo "Retry $i failed, waiting..."
            sleep $((i * 2))
          done

          # Save raw response to file for subsequent steps
          echo "$RESPONSE" > canary_response.txt

          if [[ -z "$RESPONSE" ]]; then
            echo "❌ Canary endpoint unreachable after 3 attempts"
            exit 1
          fi

      - name: Validate health status
        run: |
          RESPONSE=$(cat canary_response.txt | sed -n '/^\r*$/,$p' | sed '1d')
          
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          echo "Status: $STATUS"

          if [[ -z "$STATUS" || "$STATUS" == "null" ]]; then
            echo "❌ No status returned"
            exit 1
          fi

          if [[ "$STATUS" != "ok" ]]; then
            echo "❌ Canary not healthy: $STATUS"
            exit 1
          fi

          echo "✅ Health status: $STATUS"

      - name: Validate DB host against allowlist
        run: |
          BODY=$(cat canary_response.txt | sed -n '/^\r*$/,$p' | sed '1d')
          
          HOST=$(echo "$BODY" | jq -r '.dbHost')
          echo "Host: $HOST"

          if [[ -z "$HOST" || "$HOST" == "null" ]]; then
            echo "❌ No dbHost returned from canary"
            exit 1
          fi

          ALLOWED="${{ secrets.ALLOWED_NEON_HOSTS }}"
          echo "Allowlist: $ALLOWED"

          if [[ -z "$ALLOWED" ]]; then
            echo "❌ ALLOWED_NEON_HOSTS secret not set"
            exit 1
          fi

          MATCH=0
          IFS=',' read -ra LIST <<< "$ALLOWED"
          for h in "${LIST[@]}"; do
            h=$(echo "$h" | xargs)
            if [[ "$HOST" == "$h" ]]; then
              MATCH=1
              break
            fi
          done

          if [[ $MATCH -ne 1 ]]; then
            echo "❌ Host '$HOST' not in allowlist"
            exit 1
          fi

          echo "✅ Canary DB host validated: $HOST"

      - name: Verify canary signature (if token provided)
        if: secrets.CANARY_TOKEN != ''
        run: |
          BODY=$(cat canary_response.txt | sed -n '/^\r*$/,$p' | sed '1d')
          
          # Compute expected signature
          EXPECTED=$(node -e "
            const crypto = require('crypto');
            const body = '$BODY';
            const token = '${{ secrets.CANARY_TOKEN }}';
            const sig = crypto.createHmac('sha256', token).update(body).digest('hex');
            console.log(sig);
          ")
          
          # Get signature from response headers
          HEADERS=$(cat canary_response.txt | sed -n '1,/^\r*$/p')
          ACTUAL_SIG=$(echo "$HEADERS" | grep -i "x-canary-signature" | cut -d: -f2 | tr -d ' \r')
          
          echo "Expected: $EXPECTED"
          echo "Actual: $ACTUAL_SIG"
          
          if [[ "$EXPECTED" != "$ACTUAL_SIG" ]]; then
            echo "❌ Invalid canary signature"
            exit 1
          fi
          
          echo "✅ Signature verified"